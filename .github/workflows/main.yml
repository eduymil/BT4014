name: Run Bandit Simulations and Save Output

on:
  workflow_dispatch:
  push:
    paths:
      - "run_simulation.py"
      - "requirements.txt"

permissions:
  contents: write  # Crucial for the bot to push changes

jobs:
  run-simulations:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        algorithm: [eps, linucb, ts]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install scikit-learn pandas numpy
      - name: Run Simulation
        run: python run_simulation.py ${{ matrix.algorithm }}
      - uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.algorithm }}
          path: results_${{ matrix.algorithm }}.csv

  commit-results:
    needs: run-simulations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # Download all 3 CSVs generated by the parallel runners
      - uses: actions/download-artifact@v4
        with:
          pattern: results-*
          merge-multiple: true
          
      - name: Commit and Push Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # -f forces the add even if results_*.csv is in .gitignore
          git add -f results_*.csv
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update simulation results [skip ci]"
            git push origin main
          fi