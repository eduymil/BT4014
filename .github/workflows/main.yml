name: Run notebook and save output

on:
  workflow_dispatch:
  push:
    paths:
      - "BT4014_Disjoint.ipynb"
      - ".github/workflows/run-notebook.yml"
      - "requirements.txt"
      - "dataset/**"

permissions:
  contents: write

jobs:
  execute-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install jupyter nbconvert ipykernel

      - name: Execute notebook and save outputs
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute BT4014_Disjoint.ipynb \
            --inplace \
            --ExecutePreprocessor.timeout=1800

      - name: Commit executed notebook
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BT4014_Disjoint.ipynb
          git diff --cached --quiet || git commit -m "Auto-run notebook and save outputs"
          git push
