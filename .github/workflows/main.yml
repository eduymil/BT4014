name: Run Bandit Simulations and Save Output

on:
  workflow_dispatch:
  push:
    paths:
      - "run_simulation.py"
      - "BT4014_Plotting.ipynb"
      - ".github/workflows/run-notebook.yml"
      - "requirements.txt"

permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1: Run the 3 algorithms in parallel
  # ==========================================
  run-simulations:
    runs-on: ubuntu-latest
    strategy:
      # This matrix spins up 3 parallel jobs instantly!
      matrix:
        algorithm: [eps, linucb, ts]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install scikit-learn pandas numpy

      # Run the master python script with the specific algorithm argument
      - name: Run Simulation
        run: python run_simulation.py ${{ matrix.algorithm }}

      # Upload the resulting CSV so the next job can use it
      - name: Upload Results Artifact
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.algorithm }}
          path: results_${{ matrix.algorithm }}.csv

  # ==========================================
  # JOB 2: Combine, plot, and commit
  # ==========================================
  plot-and-commit:
    needs: run-simulations # Tells GitHub to wait until Job 1 finishes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install jupyter nbconvert ipykernel matplotlib pandas numpy

      # Download all 3 CSVs generated by the parallel runners above
      - name: Download Simulation Results
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          merge-multiple: true

      # Run the plotting notebook
      - name: Execute Plotting Notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute BT4014_Plotting.ipynb \
            --inplace \
            --ExecutePreprocessor.timeout=600

      # Commit the final notebook and the CSVs
      - name: Commit executed notebook and results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add BT4014_Plotting.ipynb results_eps.csv results_linucb.csv results_ts.csv
          git diff --cached --quiet || git commit -m "Auto-run split simulations and save outputs"
          git push