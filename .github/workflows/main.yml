name: Run Bandit Simulations and Save Output

on:
  workflow_dispatch:
  push:
    paths:
      - "run_simulation.py"
      - "requirements.txt"

jobs:
  run-simulations:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Runs all 11 algorithms in parallel
        algorithm: [
          eps, decay_eps, softmax, ucb1, ts, 
          shared_eps, shared_linucb, shared_ts, 
          disjoint_eps, disjoint_linucb, disjoint_ts
        ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install scikit-learn pandas numpy
      - name: Run Simulation
        run: python run_simulation.py ${{ matrix.algorithm }}
      - uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.algorithm }}
          path: results_${{ matrix.algorithm }}.csv