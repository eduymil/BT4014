name: Run Bandit Simulations and Save Output

on:
  workflow_dispatch:
  push:
    paths:
      - "run_simulation.py"
      - "requirements.txt"

jobs:
  run-simulations:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        algorithm:
          [
            eps,
            decay_eps,
            softmax,
            ucb1,
            bayes_ucb,
            ts,
            shared_eps,
            shared_linucb,
            shared_ts,
            disjoint_eps,
            disjoint_linucb,
            disjoint_ts
          ]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create results folder
        run: mkdir -p results

      - name: Run Simulation
        run: python run_simulation.py ${{ matrix.algorithm }}

      - name: Move result into folder
        run: mv results_${{ matrix.algorithm }}.csv results/

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.algorithm }}
          path: results/results_${{ matrix.algorithm }}.csv

  collect-results:
    needs: run-simulations
    runs-on: ubuntu-latest

    steps:
      - name: Download all result artifacts into one folder
        uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: combined-results
          merge-multiple: true

      - name: Show downloaded files
        run: ls -R combined-results

      - name: Upload one combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-results
          path: combined-results/